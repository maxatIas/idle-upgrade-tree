<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>idle-upgrade-tree</title>
    <link rel = "stylesheet" href = "style.css">
</head>
<body>
    <section>
        <div class="main">
            <div class="left">
                <h3>Gold: <span class="CoinAmount">0</span></h3>
                <img id="Coin" src="Gold.png" alt="" srcset="" onclick="incrementCoin()" draggable="false">
                <p>+<span class="clicker-amount">1</span> per click</p>
            </div>
            <div class="right">
                <div class="upgrade">
                    <div class="left-section">
                        <button class="upgrade-button" onclick="buyUpgrade1()">buy</button>
                    </div>
                    <div class="mid-section">
                        <h4>click upgrade +1</h4>
                        <div class="cost-info">
                            <p>cost: <span class="clicker-cost">10</span></p>
                            <img src="Gold.png">
                        </div>
                    </div>
                    <div class="right-section">
                        level <span class="upgrade-level">0</span>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <script src="main.js"></script>
</body>
</html>
