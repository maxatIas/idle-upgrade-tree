<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>idle-upgrade-tree</title>
    <link rel = "stylesheet" href = "style.css">
</head>
<body>
    <section>
        <div class="main">
            <div class="left">
                <h3>Gold: <span class="CoinAmount">0</span></h3>
                <img id="Coin" src="Gold.png" alt="" srcset="" onclick="incrementCoin()" draggable="false">
                <p>+<span class="clicker-amount">1</span> per click</p>
            </div>
            <div class="right">
                <div class="upgrade unavailable" id="click-upgrade1">
                    <div class="left-section">
                        <button class="upgrade-button" onclick="buyUpgrade(upgrades[0])">buy 1</button>
                        <button class="upgrade-button" onclick="buy10Upgrade(upgrades[0])">buy 10</button>
                        <button class="upgrade-button" onclick="buyMaxUpgrade(upgrades[0])">buy max</button>
                    </div>

                    <div class="mid-section">
                        <h4>click upgrade</h4>
                        <div class="cost-info">
                            <p>cost: <span class="upgrade-cost">10</span></p>
                            <img src="Gold.png">
                        </div>
                    </div>

                    <div class="right-section">
                        level <span class="upgrade-level">0</span>
                    </div>

                    <div class="level-info">
                        <p>+<span class="level-increase">1</span> per click</p>
                    </div>
                </div>

                <div class="upgrade unavailable" id="click-upgrade2">
                    <div class="left-section">
                        <button class="upgrade-button" onclick="buyUpgrade(upgrades[1])">buy 1</button>
                        <button class="upgrade-button" onclick="buy10Upgrade(upgrades[1])">buy 10</button>
                        <button class="upgrade-button" onclick="buyMaxUpgrade(upgrades[1])">buy max</button>
                    </div>

                    <div class="mid-section">
                        <h4>click upgrade</h4>
                        <div class="cost-info">
                            <p>cost: <span class="upgrade-cost">100</span></p>
                            <img src="Gold.png">
                        </div>
                    </div>

                    <div class="right-section">
                        level <span class="upgrade-level">0</span>
                    </div>

                    <div class="level-info">
                        <p>+<span class="level-increase">10</span> per click</p>
                    </div>
                </div>
                
                <div class="upgrade unavailable" id="click-upgrade3">
                    <div class="left-section">
                        <button class="upgrade-button" onclick="buyUpgrade(upgrades[2])">buy 1</button>
                        <button class="upgrade-button" onclick="buy10Upgrade(upgrades[2])">buy 10</button>
                        <button class="upgrade-button" onclick="buyMaxUpgrade(upgrades[2])">buy max</button>
                    </div>

                    <div class="mid-section">
                        <h4>click upgrade</h4>
                        <div class="cost-info">
                            <p>cost: <span class="upgrade-cost">1000</span></p>
                            <img src="Gold.png">
                        </div>
                    </div>

                    <div class="right-section">
                        level <span class="upgrade-level">0</span>
                    </div>

                    <div class="level-info">
                        <p>+<span class="level-increase">100</span> per click</p>
                    </div>
                </div>

                <div class="upgrade unavailable" id="multiplier-upgrade1">
                    <div class="left-section">
                        <button class="upgrade-button" onclick="buyUpgrade(upgrades[3])">buy</button>
                    </div>

                    <div class="mid-section">
                        <h4>multiplier upgrade</h4>
                        <div class="cost-info">
                            <p>cost: <span class="upgrade-cost">100</span></p>
                            <img src="Gold.png">
                        </div>
                    </div>

                    <div class="right-section">
                        <span class="status">not owned</span>
                    </div>

                    <div class="level-info">
                        <p>Gold income ×<span class="level-increase">1.5</span></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="main.js"></script>
</body>
</html>
