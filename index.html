<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>idle-upgrade-tree</title>
    <link rel = "stylesheet" href = "style.css">
</head>
<body>
    <section>
        <div class="main">
            <div class="left">
                <h3>Gold: <span class="CoinAmount">0</span></h3>
                <img id="Coin" src="Gold.png" alt="" srcset="" onclick="incrementCoin()" draggable="false">
                <p>+<span class="clicker-amount">1</span> per click</p>
            </div>
            <div class="right">
                <div class="upgrade">
                    <div class="left-section">
                        <button class="upgrade-button" onclick="buyUpgrade1()">buy</button>
                    </div>
                    <div class="mid-section">
                        <h4>click upgrade</h4>
                        <div class="cost-info">
                            <p>cost: <span class="clicker-cost" id="clicker1-cost">10</span></p>
                            <img src="Gold.png">
                        </div>
                    </div>
                    <div class="right-section">level <span class="upgrade-level" id="clicker1-upgrade-level">0</span></div>
                    <div class="level-info">
                        <p>+ <span class="level-increase" id="clicker1-level-increase">0</span> per click</p>
                    </div>
                </div>

                <div class="upgrade">
                    <div class="left-section">
                        <button class="upgrade-button" onclick="buyUpgrade2()">buy</button>
                    </div>
                    <div class="mid-section">
                        <h4>click upgrade</h4>
                        <div class="cost-info">
                            <p>cost: <span class="clicker-cost" id="clicker2-cost">100</span></p>
                            <img src="Gold.png">
                        </div>
                    </div>
                    <div class="right-section">level <span class="upgrade-level" id="clicker2-upgrade-level">0</span></div>
                    <div class="level-info">
                        <p>+ <span class="level-increase" id="clicker2-level-increase">0</span> per click</p>
                    </div>
                </div>
                
                <div class="upgrade">
                    <div class="left-section">
                        <button class="upgrade-button" onclick="buyUpgrade3()">buy</button>
                    </div>
                    <div class="mid-section">
                        <h4>click upgrade</h4>
                        <div class="cost-info">
                            <p>cost: <span class="clicker-cost" id="clicker3-cost">1000</span></p>
                            <img src="Gold.png">
                        </div>
                    </div>
                    <div class="right-section">level <span class="upgrade-level" id="clicker3-upgrade-level">0</span></div>
                    <div class="level-info">
                        <p>+ <span class="level-increase" id="clicker3-level-increase">0</span> per click</p>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <script src="main.js"></script>
</body>
</html>
